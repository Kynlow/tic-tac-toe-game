<html lang="en">

		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link

			rel="stylesheet"

		<link rel="stylesheet" href="css/normalize.css" />
		<link rel="stylesheet" href="css/reset.css" />
		<link rel="stylesheet" href="css/main.css" />
		<link rel="stylesheet" href="css/gamemulti.css" />
		<title>GameSolo</title>
	</head>
	<body>
		<main>
			<article class="article-top">
				<svg
					width="72"
					height="32"
					viewBox="0 0 72 32"
					fill="none"
					xmlns="http://www.w3.org/2000/svg"
				>
					<path

						clip-rule="evenodd"

						fill="#31C3BD"
					/>
					<path
						fill-rule="evenodd"
						clip-rule="evenodd"
						d="M71.9704 15.8706C71.9704 7.10551 64.8649 0 56.0998 0C47.3348 0 40.2292 7.10551 40.2292 15.8706C40.2292 24.6357 47.3348 31.7412 56.0998 31.7412C64.8649 31.7412 71.9704 24.6357 71.9704 15.8706ZM49.634 15.8706C49.634 12.2996 52.5289 9.4048 56.0998 9.4048C59.6708 9.4048 62.5656 12.2996 62.5656 15.8706C62.5656 19.4416 59.6708 22.3364 56.0998 22.3364C52.5289 22.3364 49.634 19.4416 49.634 15.8706Z"
						fill="#F2B137"
					/>
				</svg>
				<div class="turn">
					<div id="turnlogocontainer"></div>
					<p>TURN</p>
				</div>
				<button id="retry">
					<svg
						width="16"
						height="16"
						viewBox="0 0 16 16"
						fill="none"
						xmlns="http://www.w3.org/2000/svg"
					>
						<path
							d="M15.0185 2.12187e-07H13.5723C13.3701 -0.000215172 13.2061 0.163569 13.2058 0.365877C13.2058 0.371815 13.206 0.377754 13.2062 0.383692L13.3283 2.90994C11.8923 1.21674 9.78449 0.241754 7.56526 0.244185C3.39643 0.244215 -0.00304411 3.64864 2.04557e-06 7.82021C0.0030482 11.9985 3.38911 15.3846 7.56526 15.3846C9.43858 15.3873 11.2458 14.6918 12.6346 13.4337C12.7852 13.2988 12.7981 13.0673 12.6632 12.9165C12.6587 12.9114 12.654 12.9065 12.6492 12.9017L11.6121 11.8638C11.4758 11.7276 11.2574 11.7202 11.1124 11.847C8.88621 13.8069 5.49375 13.5899 3.53511 11.3622C1.57646 9.13458 1.79339 5.7399 4.01957 3.78C6.24575 1.82009 9.63821 2.03714 11.5969 4.2648C11.7504 4.43941 11.8924 4.62381 12.0221 4.81683L8.92489 4.66818C8.72295 4.65858 8.55144 4.81458 8.54184 5.01667C8.54157 5.02261 8.54141 5.02855 8.54144 5.03449V6.48169C8.54144 6.684 8.70532 6.848 8.90751 6.848H15.0186C15.2208 6.848 15.3846 6.684 15.3846 6.48169V0.366308C15.3846 0.164 15.2207 2.12187e-07 15.0185 2.12187e-07Z"
							fill="#1F3641"
						/>
					</svg>
				</button>
			</article>
			<article id="board">
				<button class="board-btn" id="1-btn"></button>
				<button class="board-btn" id="2-btn"></button>
				<button class="board-btn" id="3-btn"></button>
				<button class="board-btn" id="4-btn"></button>
				<button class="board-btn" id="5-btn"></button>
				<button class="board-btn" id="6-btn"></button>
				<button class="board-btn" id="7-btn"></button>
				<button class="board-btn" id="8-btn"></button>
				<button class="board-btn" id="9-btn"></button>
			</article>
			<dialog id="dialog1">
				<article class="dialogarticle">
					<p>PLAYER <span id="winNumber"></span>WINS</p>
					<div class="dialogrow">
						<div class="dialogrowlogo"></div>
						<h2 class="victoryh2">TAKES THE ROUND</h2>
					</div>
					<div class="dialogrow">
						<button id="quit" class="game-mode">QUIT</button>
						<button id="nextround" class="game-mode">
							NEXT ROUND
						</button>
					</div>
				</article>
			</dialog>
			<article class="bottom">
				<div class="data">
					<p class="points">X (<span id="player">P1</span>)</p>
					<h2>0</h2>
				</div>
				<div class="data">
					<p class="points">TIES</p>
					<h2>0</h2>
				</div>
				<div class="data">
					<p class="points">O (<span id="player">P2</span>)</p>
					<h2>0</h2>
				</div>
			</article>
		</main>
		<script src="gamemulti.js"></script>
	</body>
</html>
